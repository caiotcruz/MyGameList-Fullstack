<div class="community-page-wrapper">
  
  <header class="community-header">
    <div class="header-content">
      <h1 class="page-title">Comunidade</h1>
      <p class="page-subtitle">Descubra pessoas, siga perfis e acompanhe jornadas gamers.</p>
    </div>

    <div class="user-search-box">
      <div class="input-glow-container">
        <span class="search-icon">🔍</span>
        <input 
          type="text" 
          [(ngModel)]="searchQuery" 
          (input)="onSearchInput($event)" 
          placeholder="Buscar exploradores..."
          autofocus>
        
        <div *ngIf="isLoading" class="loader-neon-tiny"></div>
      </div>
    </div>
  </header>

  <main class="users-grid" *ngIf="users.length > 0">
    <div class="user-card-glass" 
         *ngFor="let user of users" 
         (click)="verPerfil(user.id)">
      
      <div class="avatar-vessel">
        <div class="avatar-glow">
          {{ user.name.charAt(0) }}
        </div>
        <div class="status-dot"></div>
      </div>

      <h3 class="user-name">{{ user.name }}</h3>

      <button
        class="follow-btn-neon"
        [class.following]="user.isFollowing"
        (click)="toggleFollow(user, $event)">
        {{ user.isFollowing ? '✓ Seguindo' : '+ Seguir' }}
      </button>
    </div>
  </main>

  <div class="empty-state-vibe" *ngIf="users.length === 0 && !isLoading">
    <div class="empty-icon">🛸</div>
    <p>Nenhum explorador encontrado no radar.</p>
  </div>
</div>
