<div class="login-container">
  <button class="btn-close" (click)="router.navigate(['/login'])" aria-label="Voltar para o login">
    <span class="fa-solid fa-xmark"></span>
  </button>
  <h2 class="brand-logo" (click)="router.navigate(['/'])">MyGameList</h2>
  <h2>Nova Senha</h2>
  <span class="subtitle">Defina uma nova senha para <strong>{{ email }}</strong></span>

  <div class="form-group">
    <label for="new-password">Nova Senha</label>
    <input 
      id="new-password"
      type="password" 
      [(ngModel)]="newPassword" 
      placeholder="Mínimo 6 caracteres"
      [disabled]="isLoading"
      (keyup.enter)="onReset()">
  </div>

  <div class="msg-error" *ngIf="errorMessage">{{ errorMessage }}</div>
  <div class="msg-success" *ngIf="successMessage">{{ successMessage }}</div>

  <button 
    class="btn-submit"
    (click)="onReset()" 
    [disabled]="isLoading || newPassword.length < 6"
    [class.btn-loading]="isLoading">
    <div class="spinner-mini" *ngIf="isLoading"></div>
    <span>{{ isLoading ? 'Alterando...' : 'Salvar Nova Senha' }}</span>
  </button>
</div>
