<div class="login-container">
  <button class="btn-close" (click)="router.navigate(['/'])" aria-label="Voltar para a página inicial">
    <span class="fa-solid fa-xmark"></span>
  </button>
  <h2 class="brand-logo" (click)="router.navigate(['/'])">MyGameList</h2>
  <h2>Junte-se a nós</h2>
  <span class="subtitle">Crie sua conta no MyGameList</span>
  
  <div class="form-group">
    <label for="name">Nome de usuário</label>
    <input 
      id="name"
      type="text" 
      [(ngModel)]="name" 
      (input)="errorMessage = ''"
      placeholder="Seu nome de usuário"
      [disabled]="isLoading">
  </div>

  <div class="form-group">
    <label for="reg-email">Email</label>
    <input 
      id="reg-email"
      type="email" 
      [(ngModel)]="email" 
      (input)="errorMessage = ''"
      placeholder="seu@email.com"
      [disabled]="isLoading">
  </div>

  <div class="form-group">
    <label for="reg-pass">Senha</label>
    <input 
      id="reg-pass"
      type="password" 
      [(ngModel)]="password" 
      (input)="errorMessage = ''"
      placeholder="Mínimo 6 caracteres"
      (keyup.enter)="onRegister()"
      [disabled]="isLoading">
  </div>

  <div class="msg-error" *ngIf="errorMessage">
    {{ errorMessage }}
  </div>

  <button class="btn-submit"
    (click)="onRegister()" 
    [disabled]="isLoading"
    [class.btn-loading]="isLoading">

    <div class="spinner-mini" *ngIf="isLoading"></div>
    <span>{{ isLoading ? 'Criando conta...' : 'Cadastrar Grátis' }}</span>
  </button>

  <div class="register-link">
    <span>Já tem uma conta?</span>
    <a routerLink="/login">Fazer Login</a>
  </div>
</div>
