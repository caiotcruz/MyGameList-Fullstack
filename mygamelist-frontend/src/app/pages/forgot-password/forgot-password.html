<div class="login-container">
  <button class="btn-close" (click)="router.navigate(['/login'])" aria-label="Voltar">
    <span class="fa-solid fa-arrow-left"></span>
  </button>

  <h2>Recuperar Senha</h2>

  <div *ngIf="!emailSent">
    <span class="subtitle">Insira seu e-mail para receber as instruções de recuperação.</span>

    <div class="form-group">
      <label for="email">Email de cadastro</label>
      <input 
        id="email"
        type="email" 
        [(ngModel)]="email" 
        placeholder="exemplo@email.com"
        [disabled]="isLoading"
        (input)="errorMessage = ''"
        (keyup.enter)="onSubmit()">
    </div>

    <div class="msg-error" *ngIf="errorMessage">
      {{ errorMessage }}
    </div>

    <button class="btn-submit" (click)="onSubmit()" [disabled]="isLoading || !email" [class.btn-loading]="isLoading">
      <div class="spinner-mini" *ngIf="isLoading"></div>
      <span>{{ isLoading ? 'Enviando...' : 'Enviar Link' }}</span>
    </button>
  </div>

  <div class="success-container" *ngIf="emailSent">
    <div class="success-icon">
      <span class="fa-solid fa-circle-check"></span>
    </div>
    <span class="subtitle success-text">
      E-mail enviado!
    </span>
    <p class="instruction-text">
      Enviamos um link de recuperação para <strong>{{ email }}</strong>. 
      Verifique sua caixa de entrada e pasta de spam.
    </p>
    <button class="btn-secondary-action" (click)="router.navigate(['/login'])">
      Voltar para o Login
    </button>
  </div>
</div>
