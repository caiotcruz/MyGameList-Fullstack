<div class="login-container">
  <button class="btn-close" (click)="router.navigate(['/login'])" aria-label="Voltar">
    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <line x1="19" y1="12" x2="5" y2="12"></line>
      <polyline points="12 19 5 12 12 5"></polyline>
    </svg>
  </button>

  <h2>Recuperar Senha</h2>

  <div *ngIf="!emailSent">
    <span class="subtitle">Insira seu e-mail para receber as instruções de recuperação.</span>

    <div class="form-group">
      <label for="email">Email de cadastro</label>
      <input 
        id="email"
        type="email" 
        [(ngModel)]="email" 
        placeholder="exemplo@email.com"
        [disabled]="isLoading"
        (input)="errorMessage = ''"
        (keyup.enter)="onSubmit()">
    </div>

    <div class="msg-error" *ngIf="errorMessage">
      {{ errorMessage }}
    </div>

    <button (click)="onSubmit()" [disabled]="isLoading || !email" [class.btn-loading]="isLoading">
      <div class="spinner-mini" *ngIf="isLoading"></div>
      <span>{{ isLoading ? 'Enviando...' : 'Enviar Link' }}</span>
    </button>
  </div>

  <div *ngIf="emailSent" class="success-container">
    <div class="success-icon">
      <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#2ed573" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
        <polyline points="22 4 12 14.01 9 11.01"></polyline>
      </svg>
    </div>
    <span class="subtitle success-text">
      E-mail enviado!
    </span>
    <p class="instruction-text">
      Enviamos um link de recuperação para <strong>{{ email }}</strong>. 
      Verifique sua caixa de entrada e pasta de spam.
    </p>
    <button class="btn-secondary" (click)="router.navigate(['/login'])">
      Voltar para o Login
    </button>
  </div>
</div>
