<div class="activities-wrapper">
  <div *ngFor="let item of activities" class="activity-card-glass">
    
    <div class="game-cover-wrapper">
      <img [src]="item.game.coverUrl" alt="Capa" class="game-cover" [routerLink]="['/game', item.game.rawgId]">
      <div class="rating-badge" *ngIf="item.type === 'RATED'">{{ item.detail }}</div>
    </div>

    <div class="activity-body">
      <div class="activity-info">
        <p class="activity-text">
          <span class="user-link" [routerLink]="['/profile', item.user.id]">{{ item.user.name }}</span>
          <span class="action-tag">{{ getActionText(item.type) }}</span>
          <span class="game-link" [routerLink]="['/game', item.game.rawgId]">{{ item.game.title }}</span>
        </p>
        <span class="activity-time">{{ item.timestamp | date:'dd MMM • HH:mm' }}</span>
      </div>

      <div class="activity-actions">
        <button class="action-btn" [class.active-like]="isLikedByMe(item)" (click)="toggleLike(item)">
          <span class="icon">{{ isLikedByMe(item) ? '❤️' : '🤍' }}</span>
          <span class="count">{{ item.likes?.length || 0 }}</span>
        </button>

        <button class="action-btn" (click)="toggleComments(item)">
          <span class="icon">💬</span>
          <span class="count">{{ item.comments?.length || 0 }}</span>
        </button>
      </div>

      <div class="comments-container" *ngIf="item.showComments">
        <div class="comments-list">
          <div class="comment-bubble" *ngFor="let c of item.comments">
            <strong>{{ c.user.name }}</strong> {{ c.text }}
          </div>
        </div>
        <div class="comment-input-box">
          <input #ipt type="text" placeholder="Adicionar comentário..." (keyup.enter)="enviarComentario(item, ipt)">
          <button (click)="enviarComentario(item, ipt)">🚀</button>
        </div>
      </div>
    </div>
  </div>

  <div *ngIf="activities.length === 0" class="empty-state-glass">
    <p>O feed está vazio. Comece uma nova jornada! 🎮</p>
  </div>
</div>
